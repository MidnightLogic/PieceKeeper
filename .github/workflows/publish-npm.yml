name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    # CRITICAL: This block grants the server permission to request the OIDC token from GitHub
    permissions:
      contents: read
      id-token: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # We intentionally omit registry-url so NPM uses OIDC instead of a token

      - name: Install Dependencies
        run: npm ci

      - name: Build Core Workspace
        run: npm run build
        working-directory: ./packages/core

      - name: Publish to NPM
        run: npm publish --access public --provenance
        working-directory: ./packages/core